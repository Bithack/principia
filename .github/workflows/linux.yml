name: linux

on:
  push:
    paths:
      - 'src/**'
      - 'lib/**'
      - 'data/**'
      - 'packaging/**'
      - 'CMakeLists.txt'
      - '.github/workflows/linux.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'lib/**'
      - 'data/**'
      - 'packaging/**'
      - 'CMakeLists.txt'
      - '.github/workflows/linux.yml'

jobs:
  linux:
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye
      env: { LANG: "C.UTF-8" }
    steps:
      - uses: actions/checkout@v6

      - name: Install deps
        run: |
          apt-get update
          apt-get install -y \
            clang-16 libgtk-3-dev libgl-dev libcurl4-openssl-dev libpng-dev libjpeg-dev libfreetype6-dev cmake ninja-build desktop-file-utils ca-certificates wget file \
            libasound2-dev libpulse-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev \
            --no-install-recommends

      - name: Build
        run: |
          mkdir build; cd build
          ../packaging/build-appimage.sh
        env:
          CC: clang-16
          CXX: clang++-16

      - name: Upload output as artifact
        uses: actions/upload-artifact@v7
        with:
          name: Principia-x86_64.AppImage
          path: build/Principia-x86_64.AppImage
          #archive: false
          if-no-files-found: error

      - name: Upload debug symbols as artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage-dbgsym
          path: build/principia.debug
          if-no-files-found: error
